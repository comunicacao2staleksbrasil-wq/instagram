<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Escala Instagram B2PRO</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="topbar">
      <div class="brand">
        <div>
          <p class="subtitle">B2PRO Marketing</p>
          <h1>📅 Escala Instagram</h1>
        </div>
      </div>
      <div class="top-actions">
        <button id="newSchedule" class="secondary-button">🔄 Nova Escala</button>
        <button id="generatePdf" class="pdf-button">📄 Exportar PDF</button>
        <button id="syncStatus" class="secondary-button">🔗 Sincronizar Secullum</button>
        <button id="logoutBtn" class="outline-button">🚪 Sair</button>
      </div>
    </header>

    <div class="layout-grid">
      <!-- Left panel -->
      <aside>
        <div class="card" style="margin-bottom:24px">
          <h2>👥 Colaboradoras</h2>
          <div id="employeeList" class="employee-list"></div>
          <div class="employee-actions">
            <button id="addCollaborator" class="outline-button">➕ Adicionar</button>
            <button id="saveTeam" class="secondary-button">💾 Salvar Equipe</button>
          </div>
        </div>

        <div class="card card-notes">
          <h2>📌 Legenda de Status</h2>
          <div class="legend-item">
            <span class="badge badge-green"></span>
            <span>Pontuou no horário (11h às 12h)</span>
          </div>
          <div class="legend-item">
            <span class="badge badge-orange"></span>
            <span>Pontuou fora do horário</span>
          </div>
          <div class="legend-item">
            <span class="badge badge-red"></span>
            <span>Não pontuou / ausente</span>
          </div>
        </div>

        <div class="card card-adjustments" style="margin-top:24px">
          <h2>✏️ Ajuste Manual</h2>
          <label>Sábado</label>
          <select id="assignmentDay" class="input-select"></select>
          <label style="margin-top:14px;display:block">Colaboradora</label>
          <select id="assignmentEmployee" class="input-select"></select>
          <label style="margin-top:14px;display:block">Status</label>
          <select id="assignmentStatus" class="input-select">
            <option value="pending">⏳ Aguardando</option>
            <option value="on-time">🟢 No horário</option>
            <option value="late">🟠 Fora do horário</option>
            <option value="absent">🔴 Ausente</option>
          </select>
          <div style="margin-top:18px">
            <button id="saveAssignment" class="secondary-button" style="width:100%">💾 Salvar Ajuste</button>
          </div>
        </div>
      </aside>

      <!-- Calendar -->
      <main>
        <div class="card calendar-card">
          <div class="calendar-header">
            <strong id="monthLabel"></strong>
          </div>
          <div id="calendar" class="calendar"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="/vendor/html2canvas.min.js"></script>
  <script src="/vendor/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Auth check: redirect to login if not authenticated
    if (!localStorage.getItem('user')) {
      window.location.href = '/';
    }
    // Logout button
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('user');
      window.location.href = '/';
    });
  </script>
</body>
</html>
